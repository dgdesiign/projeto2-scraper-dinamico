version: '3.8'

services:
  portal:
    build: .
    command: uvicorn target_server.app:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"

  scraper:
    build: .
    command: sh -c "uvicorn target_server.app:app --host 0.0.0.0 --port 8001 & sleep 2 && python main.py"
    depends_on:
      - portal
    environment:
      - TARGET_URL=http://portal:8001
      - DATABASE_URL=sqlite:///data/processos.db
    volumes:
      - ./data:/app/data

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=sqlite:///data/processos.db
    volumes:
      - ./data:/app/data
